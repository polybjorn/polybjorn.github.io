profile:
  en: "Maker and problem-solver with hands-on experience across 3D printing, product design and technical documentation. Built and managed innovation workshops, worked with over 50 clients on design and production, and authored technical manuals across 7 languages. With training in network administration and self-taught web development — equally comfortable building furniture as building servers."
  no: "Praktiker og problemløser med erfaring innen 3D-printing, produktdesign og teknisk dokumentasjon. Etablerte og driftet innovasjonsverksted, jobbet med over 50 kunder innen design og produksjon, og utarbeidet tekniske manualer på 7 språk. Med utdanning innen nettverksadministrasjon og selvlært webutvikling — like komfortabel med å bygge møbler som servere."


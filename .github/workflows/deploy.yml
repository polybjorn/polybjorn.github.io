name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build:deploy
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.NO_DEPLOY_KEY }}
          external_repository: polybjorn/polybjorn-no
          publish_branch: main
          publish_dir: ./dist-no
          commit_message: ${{ github.event.head_commit.message }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
